name: Android — Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build AAB (EAS cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB (EAS cloud)
        id: eas-build
        run: |
          BUILD_JSON=$(eas build \
            --profile production \
            --platform android \
            --non-interactive \
            --wait \
            --json)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | jq -r '
            if type == "array"
            then .[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty
            else .artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty
            end
          ')
          echo "artifact-url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Download AAB from EAS
        run: curl -fL "${{ steps.eas-build.outputs.artifact-url }}" -o build.aab

      - name: Store AAB as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: build.aab
          retention-days: 7

  deploy:
    name: Upload to Google Play (internal testing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download AAB
        uses: actions/download-artifact@v8
        with:
          name: android-release

      - name: Upload to Google Play (internal testing)
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.powrdata.horroscope
          releaseFiles: build.aab
          track: internal
          status: completed
          whatsNewDirectory: whatsnew

name: Android — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build AAB and upload to Play Store (internal)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB (EAS cloud)
        id: eas-build
        run: |
          BUILD_JSON=$(eas build \
            --profile production \
            --platform android \
            --non-interactive \
            --wait \
            --json)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | jq -r '
            if type == "array"
            then .[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty
            else .artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty
            end
          ')
          echo "artifact-url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Download AAB
        run: curl -fL "${{ steps.eas-build.outputs.artifact-url }}" -o build.aab

      - name: Upload to Google Play (internal testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.powrdata.horroscope
          releaseFiles: build.aab
          track: internal
          status: completed
          whatsNewDirectory: whatsnew

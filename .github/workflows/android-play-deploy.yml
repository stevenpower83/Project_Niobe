name: Android — Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      artifact_url:
        description: 'EAS artifact URL for the AAB (from eas build:list)'
        required: true
        type: string
      track:
        description: 'Play Store track to deploy to'
        required: true
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    name: Upload to Google Play (${{ github.event.inputs.track }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download AAB from EAS
        run: curl -fL "${{ github.event.inputs.artifact_url }}" -o build.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.powrdata.horroscope
          releaseFiles: build.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          whatsNewDirectory: whatsnew

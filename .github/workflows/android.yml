name: Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Which phase to run'
        required: true
        type: choice
        default: build-and-deploy
        options:
          - build-and-deploy
          - build-only
          - deploy-only
      artifact_url:
        description: 'EAS artifact URL — required when action is deploy-only'
        required: false
        type: string
      track:
        description: 'Play Store track'
        required: false
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production

concurrency:
  group: android
  cancel-in-progress: false

jobs:
  build:
    name: Build AAB (EAS cloud)
    if: github.event_name == 'push' || github.event.inputs.action != 'deploy-only'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    outputs:
      artifact-url: ${{ steps.eas-build.outputs.artifact-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB (EAS cloud)
        id: eas-build
        run: |
          BUILD_JSON=$(eas build \
            --profile production \
            --platform android \
            --environment production \
            --non-interactive \
            --wait \
            --json)
          ARTIFACT_URL=$(echo "$BUILD_JSON" | jq -r '
            if type == "array"
            then .[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty
            else .artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty
            end
          ')
          echo "artifact-url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy:
    name: Deploy to Google Play (${{ github.event.inputs.track || 'internal' }})
    needs: build
    if: |
      always() &&
      (github.event_name == 'push' || github.event.inputs.action != 'build-only') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve artifact URL
        id: resolve
        run: |
          if [ "${{ github.event.inputs.action }}" = "deploy-only" ]; then
            URL="${{ github.event.inputs.artifact_url }}"
          else
            URL="${{ needs.build.outputs.artifact-url }}"
          fi
          if [ -z "$URL" ]; then
            echo "::error::No artifact URL available — provide artifact_url when using deploy-only"
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download AAB
        run: curl -fL "${{ steps.resolve.outputs.url }}" -o build.aab

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.powrdata.horroscope
          releaseFiles: build.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: whatsnew

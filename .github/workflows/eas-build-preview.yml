name: OTA Update (Preview)

# Pushes a JS-only over-the-air update to the preview channel on every
# merge to main. No native rebuild needed — ships in ~3 minutes.
# If native code changed, fingerprint mismatch will cause devices to
# fall back to their current build until a new APK is distributed.

on:
  push:
    branches: [main]

jobs:
  update:
    name: EAS Update → preview channel
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo
        uses: expo/expo-github-action@8.2.1
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          eas update \
            --channel preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

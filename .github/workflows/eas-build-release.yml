name: EAS Build + Submit (Release)

# Triggered by pushing a release branch: release/1.2.0
# Builds native binaries for both platforms and submits to stores.
# After submission, pushes an OTA update to the production channel
# so existing installs get the JS update without waiting for store review.

on:
  push:
    branches:
      - release/**

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo
        uses: expo/expo-github-action@8.2.1
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build production AAB
        run: eas build --platform android --profile production --non-interactive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  build-ios:
    name: Build iOS IPA
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo
        uses: expo/expo-github-action@8.2.1
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build production IPA
        # Apple credentials managed via EAS — enroll once with: eas credentials --platform ios
        run: eas build --platform ios --profile production --non-interactive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  ota-production:
    name: OTA Update → production channel
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo
        uses: expo/expo-github-action@8.2.1
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production
        run: |
          eas update \
            --channel production \
            --message "Release: ${{ github.ref_name }}" \
            --non-interactive
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
